server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy configuration (browser → nginx → java backends, same-origin)
    location /api/catalog {
        proxy_pass http://catalog-service:9101;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/basket {
        proxy_pass http://basket-service:9103;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/orders {
        proxy_pass http://ordering-api:9102;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Health proxies — used by the /dev/flow verifier UI for cross-service smoke tests
    location = /health/catalog            { proxy_pass http://catalog-service:9101/actuator/health; }
    location = /health/ordering           { proxy_pass http://ordering-api:9102/actuator/health; }
    location = /health/basket             { proxy_pass http://basket-service:9103/actuator/health; }
    location = /health/webhooks-service   { proxy_pass http://webhooks-service:9104/actuator/health; }
    location = /health/order-processor    { proxy_pass http://order-processor:9105/actuator/health; }
    location = /health/payment-processor  { proxy_pass http://payment-processor:9106/actuator/health; }
    location = /health/webhooks-client    { proxy_pass http://webhooks-client:9107/actuator/health; }
    location = /health/mobile-bff         { proxy_pass http://mobile-bff:11632/actuator/health; }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
