# Docker Compose for the full Java stack.
#
# Phase 8: Postgres / Redis / RabbitMQ are now owned by this file (previously
# Aspire-managed). The .NET Aspire AppHost only launches the Blazor WebApp
# (and points it at this compose stack via host ports).
#
# Run with: docker compose up --build
# Dashboard:    http://localhost:9090   (Spring Boot Admin)
# Project Docs: http://localhost:3333   (Migration + Architecture + Notes)
# Tracing:      http://localhost:16686  (Jaeger)
# RabbitMQ mgmt:http://localhost:15672  (guest / see compose env)

services:
  # =============================================================================
  # INFRASTRUCTURE — Postgres, Redis, RabbitMQ
  # =============================================================================

  postgres:
    image: ankane/pgvector:latest
    container_name: eshop-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: 71UhdH_{f7C+yPyrh92RRW
      POSTGRES_DB: postgres
    volumes:
      # Named volume — reuses the existing "eshop-postgres-data" created by Aspire,
      # preserving catalogdb/orderingdb/webhooksdb data on the first compose-up.
      - eshop-postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 15
    networks:
      - eshop-network

  redis:
    image: redis:8.2
    container_name: eshop-redis
    command: ["redis-server", "--requirepass", "W7DjT4JQHfm1tMBqFZfYJu"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "W7DjT4JQHfm1tMBqFZfYJu", "ping"]
      interval: 5s
      timeout: 3s
      retries: 15
    networks:
      - eshop-network

  rabbitmq:
    image: rabbitmq:4.2-management
    container_name: eshop-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: WBpzyj95KTuVkpGxR5Fx1j
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - eshop-network


  # =============================================================================
  # OBSERVABILITY
  # =============================================================================

  spring-boot-admin:
    image: codecentric/spring-boot-admin:3.4.1
    container_name: eshop-admin
    ports:
      - "9090:8181"
    environment:
      SPRING_APPLICATION_NAME: eShop-Admin
      SPRING_BOOT_ADMIN_TITLE: eShop Dashboard
      SPRING_BOOT_ADMIN_UI_BRAND: eShop Microservices
      SPRING_BOOT_ADMIN_UI_TITLE: eShop Dashboard
    networks:
      - eshop-network

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: eshop-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    networks:
      - eshop-network

  project-docs:
    build:
      context: ./project-docs
      dockerfile: Dockerfile
    container_name: eshop-docs
    ports:
      - "3333:3333"
    environment:
      DATA_DIR: /data
    volumes:
      - ./project-docs/data:/data:ro
    networks:
      - eshop-network

  # =============================================================================
  # IDENTITY (Keycloak)
  # =============================================================================

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: eshop-keycloak
    command: start-dev --import-realm
    ports:
      - "8180:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://localhost:8180
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./infrastructure/keycloak/eshop-realm.json:/opt/keycloak/data/import/eshop-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - eshop-network

  # =============================================================================
  # MIGRATED JAVA SERVICES
  # =============================================================================

  catalog-service:
    build:
      context: ./services/catalog-service
      dockerfile: Dockerfile
    container_name: eshop-catalog
    ports:
      - "9101:9101"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/catalogdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 71UhdH_{f7C+yPyrh92RRW
      SPRING_RABBITMQ_ADDRESSES: rabbitmq:5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: WBpzyj95KTuVkpGxR5Fx1j
      IDENTITY_URL: http://host.docker.internal:8180/realms/eshop
      IDENTITY_JWK_SET_URI: http://host.docker.internal:8180/realms/eshop/protocol/openid-connect/certs
      SPRING_BOOT_ADMIN_CLIENT_URL: http://spring-boot-admin:8181
      SPRING_BOOT_ADMIN_CLIENT_INSTANCE_SERVICE-URL: http://host.docker.internal:9101
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
    depends_on:
      spring-boot-admin:
        condition: service_started
      jaeger:
        condition: service_started
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9101/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - eshop-network

  payment-processor:
    build:
      context: ./services/payment-processor
      dockerfile: Dockerfile
    container_name: eshop-payment-processor
    ports:
      - "9106:9106"
    environment:
      SPRING_RABBITMQ_ADDRESSES: rabbitmq:5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: WBpzyj95KTuVkpGxR5Fx1j
      SPRING_BOOT_ADMIN_CLIENT_URL: http://spring-boot-admin:8181
      SPRING_BOOT_ADMIN_CLIENT_INSTANCE_SERVICE-URL: http://host.docker.internal:9106
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
    depends_on:
      spring-boot-admin:
        condition: service_started
      jaeger:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9106/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - eshop-network

  order-processor:
    build:
      context: ./services/order-processor
      dockerfile: Dockerfile
    container_name: eshop-order-processor
    ports:
      - "9105:9105"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orderingdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 71UhdH_{f7C+yPyrh92RRW
      SPRING_RABBITMQ_ADDRESSES: rabbitmq:5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: WBpzyj95KTuVkpGxR5Fx1j
      SPRING_BOOT_ADMIN_CLIENT_URL: http://spring-boot-admin:8181
      SPRING_BOOT_ADMIN_CLIENT_INSTANCE_SERVICE-URL: http://host.docker.internal:9105
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
    depends_on:
      spring-boot-admin:
        condition: service_started
      jaeger:
        condition: service_started
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9105/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - eshop-network

  ordering-api:
    build:
      context: ./services/ordering/ordering-api
      dockerfile: Dockerfile
    container_name: eshop-ordering
    ports:
      - "9102:9102"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orderingdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 71UhdH_{f7C+yPyrh92RRW
      SPRING_RABBITMQ_ADDRESSES: rabbitmq:5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: WBpzyj95KTuVkpGxR5Fx1j
      IDENTITY_URL: http://host.docker.internal:8180/realms/eshop
      IDENTITY_JWK_SET_URI: http://host.docker.internal:8180/realms/eshop/protocol/openid-connect/certs
      SPRING_BOOT_ADMIN_CLIENT_URL: http://spring-boot-admin:8181
      SPRING_BOOT_ADMIN_CLIENT_INSTANCE_SERVICE-URL: http://host.docker.internal:9102
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
    depends_on:
      spring-boot-admin:
        condition: service_started
      jaeger:
        condition: service_started
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9102/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - eshop-network

  basket-service:
    build:
      context: ./services/basket-service
      dockerfile: Dockerfile
    container_name: eshop-basket
    ports:
      - "9103:9103"
      - "9113:9113"
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: W7DjT4JQHfm1tMBqFZfYJu
      SPRING_RABBITMQ_ADDRESSES: rabbitmq:5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: WBpzyj95KTuVkpGxR5Fx1j
      IDENTITY_URL: http://host.docker.internal:8180/realms/eshop
      IDENTITY_JWK_SET_URI: http://host.docker.internal:8180/realms/eshop/protocol/openid-connect/certs
      SPRING_BOOT_ADMIN_CLIENT_URL: http://spring-boot-admin:8181
      SPRING_BOOT_ADMIN_CLIENT_INSTANCE_SERVICE-URL: http://host.docker.internal:9103
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
    depends_on:
      spring-boot-admin:
        condition: service_started
      jaeger:
        condition: service_started
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9103/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - eshop-network

  webhooks-service:
    build:
      context: ./services/webhooks-service
      dockerfile: Dockerfile
    container_name: eshop-webhooks
    ports:
      - "9104:9104"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/webhooksdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 71UhdH_{f7C+yPyrh92RRW
      SPRING_RABBITMQ_ADDRESSES: rabbitmq:5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: WBpzyj95KTuVkpGxR5Fx1j
      IDENTITY_URL: http://host.docker.internal:8180/realms/eshop
      IDENTITY_JWK_SET_URI: http://host.docker.internal:8180/realms/eshop/protocol/openid-connect/certs
      WEBHOOKS_GRANT_URL_VALIDATION: "false"
      SPRING_BOOT_ADMIN_CLIENT_URL: http://spring-boot-admin:8181
      SPRING_BOOT_ADMIN_CLIENT_INSTANCE_SERVICE-URL: http://host.docker.internal:9104
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
    depends_on:
      spring-boot-admin:
        condition: service_started
      jaeger:
        condition: service_started
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9104/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - eshop-network

  webhooks-client:
    build:
      context: ./clients/webhooks-client
      dockerfile: Dockerfile
    container_name: eshop-webhooks-client
    ports:
      - "9107:9107"
    environment:
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_AUTHORIZATION_URI: http://localhost:8180/realms/eshop/protocol/openid-connect/auth
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_TOKEN_URI: http://host.docker.internal:8180/realms/eshop/protocol/openid-connect/token
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_USER_INFO_URI: http://host.docker.internal:8180/realms/eshop/protocol/openid-connect/userinfo
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_JWK_SET_URI: http://host.docker.internal:8180/realms/eshop/protocol/openid-connect/certs
      WEBHOOKS_API_URL: http://webhooks-service:9104
      WEBHOOKS_SELF_URL: http://webhooks-client:9107
      WEBHOOKS_TOKEN: "6168DB8D-DC58-4094-AF24-483278923590"
    depends_on:
      webhooks-service:
        condition: service_started
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9107/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - eshop-network

  mobile-bff:
    build:
      context: ./services/mobile-bff
      dockerfile: Dockerfile
    container_name: eshop-mobile-bff
    ports:
      - "11632:11632"
    environment:
      SPRING_CLOUD_GATEWAY_MVC_ROUTES_0_ID: catalog
      SPRING_CLOUD_GATEWAY_MVC_ROUTES_0_URI: http://catalog-service:9101
      SPRING_CLOUD_GATEWAY_MVC_ROUTES_0_PREDICATES_0: Path=/catalog-api/**
      SPRING_CLOUD_GATEWAY_MVC_ROUTES_0_FILTERS_0: StripPrefix=1
      SPRING_CLOUD_GATEWAY_MVC_ROUTES_1_ID: catalog-direct
      SPRING_CLOUD_GATEWAY_MVC_ROUTES_1_URI: http://catalog-service:9101
      SPRING_CLOUD_GATEWAY_MVC_ROUTES_1_PREDICATES_0: Path=/api/catalog/**
      SPRING_CLOUD_GATEWAY_MVC_ROUTES_2_ID: ordering
      SPRING_CLOUD_GATEWAY_MVC_ROUTES_2_URI: http://ordering-api:9102
      SPRING_CLOUD_GATEWAY_MVC_ROUTES_2_PREDICATES_0: Path=/api/orders/**
      SPRING_BOOT_ADMIN_CLIENT_URL: http://spring-boot-admin:8181
      SPRING_BOOT_ADMIN_CLIENT_INSTANCE_SERVICE-URL: http://host.docker.internal:11632
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
    depends_on:
      catalog-service:
        condition: service_healthy
      spring-boot-admin:
        condition: service_started
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11632/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - eshop-network

  # =============================================================================
  # FRONTEND — React SPA (replaces .NET Blazor WebApp)
  # =============================================================================

  webapp:
    build:
      context: ./clients/webapp
      dockerfile: Dockerfile
    container_name: eshop-webapp
    ports:
      - "8080:80"
    depends_on:
      catalog-service:
        condition: service_started
      basket-service:
        condition: service_started
      ordering-api:
        condition: service_started
    networks:
      - eshop-network

networks:
  eshop-network:
    driver: bridge

volumes:
  # Use the existing Aspire-created volume so prior order/buyer data survives the cut-over.
  # On a fresh machine this will be a new empty volume + init.sql creates the three databases.
  eshop-postgres-data:
    name: eshop-postgres-data
