# Docker Compose for migrated Java services running alongside .NET Aspire
#
# Infrastructure (postgres, redis, rabbitmq) is managed by .NET Aspire AppHost.
# Only migrated Java services and Java-specific observability tools run here.
#
# Run with: docker compose up --build
# Dashboard: http://localhost:9090 (Spring Boot Admin)
# Project Docs: http://localhost:3333 (Migration + Architecture + Notes)
# Tracing: http://localhost:16686 (Jaeger)

services:
  # =============================================================================
  # OBSERVABILITY
  # =============================================================================

  spring-boot-admin:
    image: codecentric/spring-boot-admin:3.4.1
    container_name: eshop-admin
    ports:
      - "9090:8181"
    environment:
      SPRING_APPLICATION_NAME: eShop-Admin
      SPRING_BOOT_ADMIN_TITLE: eShop Dashboard
      SPRING_BOOT_ADMIN_UI_BRAND: eShop Microservices
      SPRING_BOOT_ADMIN_UI_TITLE: eShop Dashboard
    networks:
      - eshop-network

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: eshop-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    networks:
      - eshop-network

  project-docs:
    build:
      context: ./project-docs
      dockerfile: Dockerfile
    container_name: eshop-docs
    ports:
      - "3333:3333"
    environment:
      DATA_DIR: /data
    volumes:
      - ./project-docs/data:/data:ro
    networks:
      - eshop-network

  # =============================================================================
  # MIGRATED JAVA SERVICES
  # =============================================================================

  catalog-service:
    build:
      context: ./services/catalog-service
      dockerfile: Dockerfile
    container_name: eshop-catalog
    ports:
      - "9101:9101"
    environment:
      SPRING_PROFILES_ACTIVE: dotnet
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/catalogdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_RABBITMQ_ADDRESSES: host.docker.internal:5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      SPRING_BOOT_ADMIN_CLIENT_URL: http://spring-boot-admin:8181
      SPRING_BOOT_ADMIN_CLIENT_INSTANCE_SERVICE-URL: http://host.docker.internal:9101
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: catalog-service
    depends_on:
      spring-boot-admin:
        condition: service_started
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9101/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - eshop-network

  payment-processor:
    build:
      context: ./services/payment-processor
      dockerfile: Dockerfile
    container_name: eshop-payment-processor
    ports:
      - "9106:9106"
    environment:
      SPRING_RABBITMQ_ADDRESSES: host.docker.internal:5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: WBpzyj95KTuVkpGxR5Fx1j
      SPRING_BOOT_ADMIN_CLIENT_URL: http://spring-boot-admin:8181
      SPRING_BOOT_ADMIN_CLIENT_INSTANCE_SERVICE-URL: http://host.docker.internal:9106
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://jaeger:4318/v1/metrics
    depends_on:
      spring-boot-admin:
        condition: service_started
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9106/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
