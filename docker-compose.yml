      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: WBpzyj95KTuVkpGxR5Fx1j
      SPRING_BOOT_ADMIN_CLIENT_URL: http://spring-boot-admin:8181
      SPRING_BOOT_ADMIN_CLIENT_INSTANCE_SERVICE-URL: http://host.docker.internal:9104
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
