    description: "Background worker — queries orderingdb for grace period orders, publishes events."
    java_module: services/order-processor
    dotnet_source: src/OrderProcessor
    status: pending
    tasks:
      - id: P2-T1
        name: Create GracePeriodConfirmedIntegrationEvent
        description: |
          Create event class with orderId field.
          Extends IntegrationEvent.
        dotnet_files:
