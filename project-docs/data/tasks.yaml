      - id: P2-T2
        name: Create BackgroundTaskOptions configuration
        description: |
          Create config class with gracePeriodTime (minutes) and checkUpdateTime (seconds).
          Use @ConfigurationProperties(prefix = "background-task").
          Add defaults in application.yml.
        dotnet_files:
          - src/OrderProcessor/BackgroundTaskOptions.cs
        java_files:
          - services/order-processor/src/main/java/com/eshop/orderprocessor/config/BackgroundTaskOptions.java
        status: done

      - id: P2-T3
        name: Implement GracePeriodManagerService
        description: |
          Scheduled background service that:
          1. Runs every checkUpdateTime seconds (@Scheduled)
          2. Queries ordering.orders for orders where (now - OrderDate >= gracePeriodTime) AND OrderStatus = 'Submitted'
          3. For each matching order, publishes GracePeriodConfirmedIntegrationEvent
          Uses JdbcTemplate or native query (matches .NET Npgsql approach).
        dotnet_files:
          - src/OrderProcessor/Services/GracePeriodManagerService.cs
        java_files:
          - services/order-processor/src/main/java/com/eshop/orderprocessor/service/GracePeriodManagerService.java
        status: done

      - id: P2-T4
        name: Remove old stub event handler
        description: |
          Delete OrderStatusChangedEventHandler.java (the stub).
          Order processor doesn't consume events — it polls the DB and publishes.
        java_files:
          - services/order-processor/src/main/java/com/eshop/orderprocessor/events/OrderStatusChangedEventHandler.java
        status: done

      - id: P2-T5
        name: Update application.yml
        description: |
          Update order-processor application.yml:
          - Postgres password: 71UhdH_{f7C+yPyrh92RRW
          - RabbitMQ password: WBpzyj95KTuVkpGxR5Fx1j
          - Add OTLP tracing/metrics endpoints
          - Add server.address: 0.0.0.0
          - Add background-task.gracePeriodTime and checkUpdateTime
          - Add JPA quoted identifiers for PascalCase columns
        java_files:
          - services/order-processor/src/main/resources/application.yml
        status: done

      - id: P2-T6
        name: Verify compilation
        description: |
          Run: ./mvnw compile -pl services/order-processor -am
          Fix any compilation errors.
        status: done

      - id: P2-T7
        name: Add to docker-compose.yml
        description: |
          Add order-processor service to docker-compose.yml.
          Needs host.docker.internal for Postgres and RabbitMQ.
        java_files:
          - docker-compose.yml
        status: done

      - id: P2-T8
        name: Update .NET AppHost
        description: |
          Add useJavaOrderProcessor flag to eShop AppHost Program.cs.
        dotnet_files:
          - src/eShop.AppHost/Program.cs
        status: done

