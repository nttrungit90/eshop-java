  - id: phase-1
    name: Payment Processor
    description: "Simplest service — no DB, only RabbitMQ. Replace stub with real event handling."
    java_module: services/payment-processor
    dotnet_source: src/PaymentProcessor
    status: in_progress
    tasks:
      - id: P1-T1
        name: Create integration event classes
        description: |
          Create 3 event classes in com.eshop.paymentprocessor.events:
          - OrderStatusChangedToStockConfirmedIntegrationEvent (orderId)
          - OrderPaymentSucceededIntegrationEvent (orderId)
          - OrderPaymentFailedIntegrationEvent (orderId)
          All extend IntegrationEvent with no-arg constructor + orderId constructor.
        dotnet_files:
          - src/PaymentProcessor/IntegrationEvents/Events/OrderStatusChangedToStockConfirmedIntegrationEvent.cs
          - src/PaymentProcessor/IntegrationEvents/Events/OrderPaymentSucceededIntegrationEvent.cs
          - src/PaymentProcessor/IntegrationEvents/Events/OrderPaymentFailedIntegrationEvent.cs
        java_files:
          - services/payment-processor/src/main/java/com/eshop/paymentprocessor/events/OrderStatusChangedToStockConfirmedIntegrationEvent.java
          - services/payment-processor/src/main/java/com/eshop/paymentprocessor/events/OrderPaymentSucceededIntegrationEvent.java
          - services/payment-processor/src/main/java/com/eshop/paymentprocessor/events/OrderPaymentFailedIntegrationEvent.java
        status: done

      - id: P1-T2
        name: Create PaymentOptions configuration class
        description: |
          Create PaymentOptions config class with boolean paymentSucceeded property.
          Use @ConfigurationProperties(prefix = "payment") bound to application.yml.
          Add payment.paymentSucceeded=true default in application.yml.
        dotnet_files:
          - src/PaymentProcessor/PaymentOptions.cs
        java_files:
          - services/payment-processor/src/main/java/com/eshop/paymentprocessor/config/PaymentOptions.java
        status: done

      - id: P1-T3
        name: Implement event handler
        description: |
          Create OrderStatusChangedToStockConfirmedIntegrationEventHandler:
          - @RabbitListener on payment-processor queue
          - Deserialize OrderStatusChangedToStockConfirmedIntegrationEvent from message
          - Check PaymentOptions.paymentSucceeded
          - If true: publish OrderPaymentSucceededIntegrationEvent via EventBus
          - If false: publish OrderPaymentFailedIntegrationEvent via EventBus
          Reference .NET: OrderStatusChangedToStockConfirmedIntegrationEventHandler.cs
        dotnet_files:
          - src/PaymentProcessor/IntegrationEvents/EventHandling/OrderStatusChangedToStockConfirmedIntegrationEventHandler.cs
        java_files:
          - services/payment-processor/src/main/java/com/eshop/paymentprocessor/events/OrderStatusChangedToStockConfirmedIntegrationEventHandler.java
        status: done

      - id: P1-T4
        name: Remove old stub event handler
        description: |
          Delete OrderStatusChangedToPaidEventHandler.java (the stub).
          It is replaced by the new handler from P1-T3.
        java_files:
          - services/payment-processor/src/main/java/com/eshop/paymentprocessor/events/OrderStatusChangedToPaidEventHandler.java
        status: done

      - id: P1-T5
        name: Update application.yml
        description: |
          Update payment-processor application.yml:
          - RabbitMQ password: WBpzyj95KTuVkpGxR5Fx1j
          - Add OTLP tracing/metrics endpoints
          - Add server.address: 0.0.0.0
          - Add payment.paymentSucceeded: true
          Reference: catalog-service application.yml for format
        java_files:
          - services/payment-processor/src/main/resources/application.yml
        status: done

      - id: P1-T6
        name: Verify compilation
        description: |
          Run: ./mvnw compile -pl services/payment-processor -am
          Fix any compilation errors.
        status: done

      - id: P1-T7
        name: Add to docker-compose.yml
        description: |
          Add payment-processor service to eshop-java/docker-compose.yml.
          Connect to Aspire infra via host.docker.internal.
          Reference: catalog-service entry in docker-compose.yml.
        java_files:
          - docker-compose.yml
        status: done

      - id: P1-T8
        name: Update .NET AppHost
        description: |
          Add useJavaPaymentProcessor flag to eShop AppHost Program.cs.
          When true: skip .NET PaymentProcessor project.
          When false: original behavior.
        dotnet_files:
          - src/eShop.AppHost/Program.cs
        status: done

  - id: phase-2
