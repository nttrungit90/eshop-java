# Ordering API configuration
# Running alongside .NET Aspire services

spring:
  application:
    name: ordering-api

  datasource:
    url: jdbc:postgresql://localhost:5432/orderingdb
    username: postgres
    password: 71UhdH_{f7C+yPyrh92RRW
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
      naming:
        # Spring Boot's default snake-case strategy rewrites @Column(name = "BuyerId") to "buyer_id" before quoting.
        # Use the standard strategy so the .NET PascalCase names ("BuyerId", "OrderDate", ...) pass through.
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        # .NET schema uses PascalCase quoted identifiers ("Id", "BuyerId", "OrderDate", ...).
        # Quote everything so @Column(name = "Id") goes to SQL as "Id" rather than id.
        globally_quoted_identifiers: true
        globally_quoted_identifiers_skip_column_definitions: true
        # EF Core HiLo on Postgres: nextval is the LOW end of a 10-ID block. Hibernate's
        # default pooled optimizer treats it as HI (block top). Force "lo" so allocation
        # blocks line up with the existing data in the ordering.*seq sequences.
        id.optimizer.pooled.prefer_lo: true

  rabbitmq:
    addresses: localhost:5672
    username: guest
    password: WBpzyj95KTuVkpGxR5Fx1j

  boot:
    admin:
      client:
        url: http://localhost:9090
        instance:
          service-url: http://host.docker.internal:9102

server:
  port: 9102
  address: 0.0.0.0
  max-http-request-header-size: 48KB

# Security - Keycloak OIDC
identity:
  url: http://localhost:8180/realms/eshop
  jwk-set-uri: http://localhost:8180/realms/eshop/protocol/openid-connect/certs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers
  endpoint:
    health:
      show-details: always
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.eshop: DEBUG
