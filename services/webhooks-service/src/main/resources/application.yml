# Webhooks Service configuration
# Running alongside .NET Aspire services

spring:
  application:
    name: webhooks-service

  datasource:
    url: jdbc:postgresql://localhost:5432/webhooksdb
    username: postgres
    password: 71UhdH_{f7C+yPyrh92RRW
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        globally_quoted_identifiers: true
        globally_quoted_identifiers_skip_column_definitions: true
    generate-ddl: false

  rabbitmq:
    addresses: localhost:5672
    username: guest
    password: WBpzyj95KTuVkpGxR5Fx1j

  boot:
    admin:
      client:
        url: http://localhost:9090
        instance:
          service-url: http://host.docker.internal:9104

server:
  port: 9104
  address: 0.0.0.0

# Security - Identity Service (.NET Identity API HTTP endpoint)
identity:
  url: http://localhost:5223

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.eshop: DEBUG
