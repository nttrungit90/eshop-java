# Basket Service configuration
# Running alongside .NET Aspire services

spring:
  application:
    name: basket-service

  data:
    redis:
      host: localhost
      port: 6380
      password: W7DjT4JQHfm1tMBqFZfYJu

  rabbitmq:
    addresses: localhost:5672
    username: guest
    password: WBpzyj95KTuVkpGxR5Fx1j

  boot:
    admin:
      client:
        url: http://localhost:9090
        instance:
          service-url: http://host.docker.internal:9103

server:
  port: 9103
  max-http-request-header-size: 48KB

# gRPC server
grpc:
  server:
    port: 9113

# Security - Keycloak OIDC
identity:
  url: http://localhost:8180/realms/eshop
  jwk-set-uri: http://localhost:8180/realms/eshop/protocol/openid-connect/certs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers
  endpoint:
    health:
      show-details: always
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.eshop: DEBUG
