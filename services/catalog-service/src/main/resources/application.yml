# Catalog Service configuration
# Running alongside .NET Aspire services

spring:
  application:
    name: catalog-service

  datasource:
    url: jdbc:postgresql://localhost:5432/catalogdb
    username: postgres
    password: 71UhdH_{f7C+yPyrh92RRW
    driver-class-name: org.postgresql.Driver

  flyway:
    # Don't run migrations - .NET already created schema
    enabled: false

  jpa:
    hibernate:
      # Don't validate or modify .NET's schema
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        # Quote all identifiers to preserve PascalCase in PostgreSQL
        globally_quoted_identifiers: true
        globally_quoted_identifiers_skip_column_definitions: true
    generate-ddl: false

  rabbitmq:
    addresses: localhost:5672
    username: guest
    password: WBpzyj95KTuVkpGxR5Fx1j

  boot:
    admin:
      client:
        url: http://localhost:9090
        instance:
          service-url: http://host.docker.internal:9101

server:
  port: 9101

# Catalog-specific configuration
catalog:
  pics-path: classpath:pics
  use-customization-data: false
  ai:
    enabled: false

# Security - Identity Service
identity:
  url: http://localhost:9100

management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
    metrics:
      export:
        enabled: true
        url: http://localhost:4318/v1/metrics
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.eshop: DEBUG
    org.springframework.web: DEBUG
