# Payment Processor configuration
# Running alongside .NET Aspire services

spring:
  application:
    name: payment-processor

  rabbitmq:
    addresses: localhost:5672
    username: guest
    password: WBpzyj95KTuVkpGxR5Fx1j

  boot:
    admin:
      client:
        url: http://localhost:9090
        instance:
          service-url: http://localhost:9106

server:
  port: 9106
  address: 0.0.0.0

payment:
  payment-succeeded: true

management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
    metrics:
      export:
        enabled: true
        url: http://localhost:4318/v1/metrics
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.eshop: DEBUG
